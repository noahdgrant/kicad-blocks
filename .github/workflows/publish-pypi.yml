name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kicad-blocks
    permissions:
      # OIDC token for PyPI trusted publishing.
      id-token: write
      # Needed by `gh release upload` to attach built artifacts to the release.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload sdist and wheel to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.tar.gz dist/*.whl --clobber
